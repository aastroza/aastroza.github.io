site_name: aastroza
theme:
  name: material
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: pink
    accent: pink
    toggle:
      icon: material/lightbulb-outline
      name: "Switch to dark mode"
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: pink
    accent: pink
    toggle:
      icon: material/lightbulb
      name: "Switch to light mode"
  features:
    - navigation.tabs
nav:
- Home:
  - About Me: index.md
- Generative AI:
  - Introduccion: genai/introduccion.md
- Data Products:
  - Introduccion: dataproducts/introduccion.md