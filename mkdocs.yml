site_name: aastroza
theme:
  name: material
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: pink
    accent: pink
    toggle:
      icon: material/lightbulb-outline
      name: "Switch to dark mode"
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: pink
    accent: pink
    toggle:
      icon: material/lightbulb
      name: "Switch to light mode"
  features:
    - navigation.tabs
nav:
- Home:
  - About Me: index.md
- Generative AI:
  - Intro: genai/introduccion.md
- Data Products:
  - Introduccion: dataproducts/introduccion.md
- AI Pair Programming:
  - Intro: [aicoding/intro.md]
- Esports:
  - Introduccion: esports/introduccion.md
- PowerBI:
  - Video Course: powerbi/introduccion.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - social

extra:
  social:
    - icon: fontawesome/solid/paper-plane
      link: mailto:<alonsoastroza@gmail.com>
    - icon: fontawesome/brands/github
      link: https://github.com/aastroza
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/aastrozacl/
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/aastroza

copyright: Copyright &copy; 2023 Alonso Astroza