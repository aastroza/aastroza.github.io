site_name: aastroza
theme:
  name: material
  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    primary: pink
    accent: pink
    toggle:
      icon: material/lightbulb-outline
      name: "Switch to dark mode"
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    primary: pink
    accent: pink
    toggle:
      icon: material/lightbulb
      name: "Switch to light mode"
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
  nav:
  - Home:
    - This is me: index.md
  - Generative AI Course:
    - Intro: genai/intro.md
  - Data Products Course:
    - Intro: dataproducts/intro.md